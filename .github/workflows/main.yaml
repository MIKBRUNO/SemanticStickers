name: "Deploy"
on:
  pull_request:
    branches:
    - main
  workflow_dispatch:
jobs:
  deploy_to_server:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
    - name: Deploy to server
      uses: tiyee/action-ssh@v1.0.1
      env:
        DOTENV: ${{ secrets.DEPLOY_DOTENV }}
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        privateKey: ${{ secrets.DEPLOY_KEY }}
        command: |
          cd /home/deploy/SemanticStickers
          echo $DEPLOY_DOTENV > .env
          echo "Dotenv file updated"
          echo "Git pulling..."
          git pull
          echo "Compose build..."
          docker compose build
          echo "Compose up..."
          docker compose up -d
